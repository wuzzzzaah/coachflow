version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      typescript-tooling:
        patterns:
          - 'typescript'
          - '@typescript-eslint/*'
          - 'eslint*'
          - 'prettier'
          - 'vitest'
          - 'husky'
          - 'lint-staged'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
