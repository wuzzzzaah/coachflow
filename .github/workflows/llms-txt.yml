name: Generate llms.txt

on:
  push:
    branches: [main]

jobs:
  generate-llms-txt:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install llmstxt-gen
        run: pip install llmstxt-gen

      - name: Generate llms.txt
        run: llmstxt-gen generate

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet llms.txt llms-full.txt && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Ensure automated label exists
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "automated" \
            --description "Automatically generated by a workflow" \
            --color "0075ca" 2>/dev/null || true

      - name: Push to branch and open PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/update-llms-txt-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add llms.txt llms-full.txt
          git commit -m "chore: update llms.txt and llms-full.txt"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: update llms.txt and llms-full.txt" \
            --body "Auto-generated by the \`Generate llms.txt\` workflow after changes merged to main." \
            --base main \
            --head "$BRANCH" \
            --label "automated"
