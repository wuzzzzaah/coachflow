name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck (shared)
        run: pnpm --filter @coachflow/shared exec tsc --noEmit

      - name: Typecheck (api)
        run: pnpm --filter api exec tsc --noEmit

      - name: Typecheck (admin)
        run: pnpm --filter admin exec tsc --noEmit

      - name: Test (api)
        run: pnpm --filter api test --run

      - name: Test (shared)
        run: pnpm --filter @coachflow/shared test --run
